<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Phone Lock</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Phone Lock">
<meta name="theme-color" content="#0a0a12">
<link rel="manifest" href="manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a12;
    --sub: rgba(255,255,255,0.55);
    --emergency: #ff453a;
    --key-bg: rgba(255,255,255,0.13);
    --key-active: rgba(255,255,255,0.28);
  }
  html, body {
    height: 100%; width: 100%; overflow: hidden;
    background: var(--bg);
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    color: #fff; touch-action: manipulation; user-select: none;
  }
  .bg-blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; pointer-events: none; z-index: 0; }
  .blob1 { width: 300px; height: 300px; background: #3a6de8; top: -80px; left: -60px; }
  .blob2 { width: 250px; height: 250px; background: #7b2fe0; bottom: 100px; right: -50px; }
  .blob3 { width: 200px; height: 200px; background: #0ea5e9; bottom: 250px; left: 30px; }
  .screen { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; align-items: center; padding: env(safe-area-inset-top,0px) env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px); }
  .top { flex: 0 0 auto; text-align: center; padding-top: max(40px,8vh); padding-bottom: 10px; }
  .time { font-size: clamp(64px,18vw,88px); font-weight: 200; letter-spacing: -3px; line-height: 1; }
  .date { font-size: clamp(14px,4vw,17px); color: var(--sub); margin-top: 6px; }
  .input-area { flex: 0 0 auto; margin-top: max(20px,4vh); display: flex; align-items: center; justify-content: center; gap: 14px; height: 24px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.6); background: transparent; transition: background 0.15s, transform 0.12s; }
  .dot.filled { background: #fff; transform: scale(1.1); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)} }
  .input-area.shake { animation: shake 0.4s ease; }
  .keypad-wrap { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; padding: 0 20px; max-width: 360px; }
  .keypad { display: grid; grid-template-columns: repeat(3,1fr); gap: clamp(10px,3vw,16px); width: 100%; max-width: 320px; }
  .key { aspect-ratio: 1; border-radius: 50%; background: var(--key-bg); border: none; color: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background 0.1s, transform 0.1s; position: relative; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); max-width: 88px; max-height: 88px; margin: 0 auto; width: 100%; }
  .key:active { background: var(--key-active); transform: scale(0.93); }
  .key .num { font-size: clamp(22px,7vw,30px); font-weight: 300; line-height: 1; }
  .key .letters { font-size: clamp(8px,2.5vw,10px); letter-spacing: 1.5px; color: var(--sub); margin-top: 2px; }
  .key.empty { background: transparent; pointer-events: none; }
  .key.del { background: transparent; }
  .key.del .del-icon { font-size: clamp(20px,6vw,26px); color: rgba(255,255,255,0.75); }
  .bottom-row { flex: 0 0 auto; width: 100%; max-width: 360px; padding: 0 20px; display: flex; justify-content: flex-end; align-items: center; padding-bottom: max(30px,5vh); margin-top: max(14px,2vh); }
  .btn-emergency { background: transparent; border: none; color: var(--emergency); font-size: clamp(13px,3.5vw,15px); font-weight: 500; cursor: pointer; padding: 8px 4px; }
  .btn-emergency:active { opacity: 0.6; }
  .btn-cancel { background: transparent; border: none; color: rgba(255,255,255,0.7); font-size: clamp(13px,3.5vw,15px); font-weight: 400; cursor: pointer; padding: 8px 4px; }
  .btn-cancel:active { opacity: 0.6; }
  @keyframes flashGreen { 0%{opacity:0} 30%{opacity:1} 100%{opacity:0} }
  .flash { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(52,199,89,0.18); pointer-events: none; }
  .flash.go { display: block; animation: flashGreen 0.6s ease forwards; }
  @keyframes ripple { from{transform:translate(-50%,-50%) scale(0);opacity:0.4} to{transform:translate(-50%,-50%) scale(2.5);opacity:0} }
  .ripple-el { position: absolute; width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.3); animation: ripple 0.5s ease-out forwards; pointer-events: none; }
</style>
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>
<div class="screen">
  <div class="top">
    <div class="time" id="clock">--:--</div>
    <div class="date" id="dateStr">Loading...</div>
  </div>
  <div class="input-area" id="inputArea">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>
  <div class="keypad-wrap">
    <div class="keypad" id="keypad">
      <button class="key" data-val="1"><span class="num">1</span><span class="letters"> </span></button>
      <button class="key" data-val="2"><span class="num">2</span><span class="letters">ABC</span></button>
      <button class="key" data-val="3"><span class="num">3</span><span class="letters">DEF</span></button>
      <button class="key" data-val="4"><span class="num">4</span><span class="letters">GHI</span></button>
      <button class="key" data-val="5"><span class="num">5</span><span class="letters">JKL</span></button>
      <button class="key" data-val="6"><span class="num">6</span><span class="letters">MNO</span></button>
      <button class="key" data-val="7"><span class="num">7</span><span class="letters">PQRS</span></button>
      <button class="key" data-val="8"><span class="num">8</span><span class="letters">TUV</span></button>
      <button class="key" data-val="9"><span class="num">9</span><span class="letters">WXYZ</span></button>
      <button class="key empty"></button>
      <button class="key" data-val="0"><span class="num">0</span><span class="letters"> </span></button>
      <button class="key del" id="delBtn"><span class="del-icon">⌫</span></button>
    </div>
  </div>
  <div class="bottom-row">
    <button class="btn-emergency" id="emergencyBtn">Emergency</button>
    <button class="btn-cancel" id="cancelBtn">Cancel</button>
  </div>
</div>
<div class="overlay" id="overlay" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.85);flex-direction:column;align-items:center;justify-content:center;gap:20px;backdrop-filter:blur(10px);">
  <div style="font-size:56px">🚨</div>
  <div style="font-size:22px;font-weight:600">Emergency Call</div>
  <div style="font-size:15px;color:var(--sub);text-align:center;max-width:260px;line-height:1.5">This is a safe screen — no real call is being made.</div>
  <button onclick="document.getElementById('overlay').style.display='none'" style="margin-top:20px;background:rgba(255,255,255,0.12);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:500;padding:14px 48px;cursor:pointer">Go Back</button>
</div>
<div class="flash" id="flash"></div>
<script>
  function updateClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    document.getElementById('clock').textContent = h + ':' + m;
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('dateStr').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
  }
  updateClock();
  setInterval(updateClock, 10000);

  function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

  const PARENT_PIN = '2024';
  let entered = '';

  function updateDots() {
    for (let i = 0; i < 4; i++)
      document.getElementById('d'+i).classList.toggle('filled', i < entered.length);
  }

  function shakeInput() {
    const el = document.getElementById('inputArea');
    el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
    setTimeout(() => el.classList.remove('shake'), 500);
  }

  function pressKey(val) {
    if (entered.length >= 4) return;
    vibrate(30); entered += val; updateDots();
    if (entered.length === 4) setTimeout(checkPin, 120);
  }

  function deleteLast() {
    if (entered.length > 0) { vibrate(20); entered = entered.slice(0,-1); updateDots(); }
  }

  function checkPin() {
    if (entered === PARENT_PIN) {
      vibrate([40,60,40]);
      const flash = document.getElementById('flash');
      flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
      entered = ''; updateDots();
    } else {
      vibrate([60,50,60,50,60]); shakeInput();
      setTimeout(() => { entered = ''; updateDots(); }, 600);
    }
  }

  function addRipple(btn, e) {
    const r = document.createElement('div'); r.className = 'ripple-el';
    const rect = btn.getBoundingClientRect();
    r.style.left = ((e.clientX || e.touches?.[0]?.clientX || rect.left+rect.width/2) - rect.left) + 'px';
    r.style.top  = ((e.clientY || e.touches?.[0]?.clientY || rect.top+rect.height/2) - rect.top) + 'px';
    btn.appendChild(r); setTimeout(() => r.remove(), 500);
  }

  document.getElementById('keypad').addEventListener('click', e => {
    const key = e.target.closest('.key'); if (!key) return;
    const val = key.dataset.val;
    if (val !== undefined) { addRipple(key, e); pressKey(val); }
  });
  document.getElementById('delBtn').addEventListener('click', e => { addRipple(document.getElementById('delBtn'),e); deleteLast(); });
  document.getElementById('emergencyBtn').addEventListener('click', () => { vibrate(50); document.getElementById('overlay').style.display='flex'; });
  document.getElementById('cancelBtn').addEventListener('click', () => { entered = ''; updateDots(); });

  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());

  function goFullscreen() {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (req) req.call(el).catch(() => {});
  }
  document.addEventListener('touchstart', goFullscreen, { once: true });
  document.addEventListener('click', goFullscreen, { once: true });

  function floodHistory() {
    for (let i = 0; i < 50; i++) history.pushState({ lock: i }, '', location.href);
  }
  floodHistory();
  window.addEventListener('popstate', () => { history.pushState(null,'',location.href); floodHistory(); });
  document.addEventListener('visibilitychange', () => { if (document.visibilityState==='visible') { floodHistory(); goFullscreen(); } });
  window.addEventListener('pageshow', e => { if (e.persisted) floodHistory(); floodHistory(); });
  window.addEventListener('focus', floodHistory);
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  document.addEventListener('keydown', e => {
    if (e.key==='F5'||e.key==='Backspace'||(e.altKey&&e.key==='ArrowLeft')||(e.ctrlKey&&['r','w','t','l'].includes(e.key)))
      e.preventDefault();
  });
  document.addEventListener('dragstart', e => e.preventDefault());
  window.addEventListener('beforeunload', e => { e.preventDefault(); e.returnValue=''; floodHistory(); });
</script>
</body>
</html>
